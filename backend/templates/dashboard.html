<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Office Power Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-void: #0d0f12;
        --panel: #15181d;
        --panel-alt: #1a1e24;
        --border: #262b33;
        --text-primary: #e6e9ed;
        --text-muted: #7d8590;
        --amber: #f5a742;
        --amber-dim: #5a4326;
        --cyan: #4fd1c5;
        --cyan-dim: #1e3d3a;
        --alert: #e2574c;
        --alert-dim: #3a201d;
      }

      * {

      body {
        margin: 0;
        padding: 0;
        background: var(--bg-void);
        color: var(--text-primary);
        font-family: "Space Grotesk", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .mono {
        font-family: "IBM Plex Mono", monospace;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }

      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 20px 60px;
      }

      /* ---------- Header ---------- */
      header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        flex-wrap: wrap;
        gap: 20px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 20px;
        margin-bottom: 28px;
      }
      .brand-eyebrow {
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .subline {
        color: var(--text-muted);
        font-size: 13px;
        margin-top: 4px;
      }

      .readouts {
        display: flex;
        gap: 28px;
      }
      .readout {
        text-align: right;
      }
      .readout .label {
        font-size: 10.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 4px;
      }
      .readout .value {
        font-size: 28px;
        font-weight: 600;
        line-height: 1;
      }
      .readout .value.power {
        color: var(--amber);
      }
      .readout .unit {
        font-size: 14px;
        color: var(--text-muted);
        margin-left: 3px;
      }

      /* ---------- Floor plan (signature element) ---------- */
      .floorplan-section {
        margin-bottom: 34px;
      }
      .section-label {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 14px;
      }
      .section-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .floorplan {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: 2px;
        overflow: hidden;
      }
      .room {
        background:
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 23px,
            #ffffff05 24px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 23px,
            #ffffff05 24px
          ),
          var(--panel);
        padding: 16px 14px 18px;
        min-height: 220px;
        display: flex;
        flex-direction: column;
      }
      .room-name {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .room-power {
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 14px;
      }
      .room-power .num {
        color: var(--text-primary);
      }

      .nodes {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px 8px;
        align-content: start;
      }
      .node {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .node .id-tag {
        font-family: "IBM Plex Mono", monospace;
        font-size: 9.5px;
        color: var(--text-muted);
      }

      /* light node */
      .bulb {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #2a2d33;
        border: 1.5px solid #3a3f47;
        transition:
          background 0.3s ease,
          border-color 0.3s ease,
          box-shadow 0.3s ease;
      }
      .bulb.on {
        background: var(--amber);
        border-color: var(--amber);
        box-shadow:
          0 0 10px 2px #f5a74280,
          0 0 22px 6px #f5a74230;
        animation: pulse-glow 2.6s ease-in-out infinite;
      }
      @keyframes pulse-glow {
        0%,
        100% {
          box-shadow:
            0 0 10px 2px #f5a74280,
            0 0 22px 6px #f5a74230;
        }
        50% {
          box-shadow:
            0 0 14px 3px #f5a742a0,
            0 0 30px 10px #f5a74240;
        }
      }

      /* fan node */
      .fan {
        width: 24px;
        height: 24px;
        position: relative;
      }
      .fan .blade-set {
        width: 100%;
        height: 100%;
        position: relative;
        transform-origin: 50% 50%;
      }
      .fan .blade {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 9px;
        height: 3px;
        border-radius: 2px;
        background: #4a4f57;
        transform-origin: 0 50%;
        transition: background 0.3s ease;
      }
      .fan .blade:nth-child(1) {
        transform: rotate(0deg);
      }
      .fan .blade:nth-child(2) {
        transform: rotate(90deg);
      }
      .fan .blade:nth-child(3) {
        transform: rotate(180deg);
      }
      .fan .blade:nth-child(4) {
        transform: rotate(270deg);
      }
      .fan .hub {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 5px;
        height: 5px;
        background: #5a5f67;
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }
      .fan.on .blade {
        background: var(--cyan);
      }
      .fan.on .hub {
        background: var(--cyan);
        box-shadow: 0 0 8px 2px #4fd1c560;
      }
      .fan.on .blade-set {
        animation: spin 1.1s linear infinite;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .node-off-label {
        font-size: 9px;
        color: var(--text-muted);
      }
      .node-on-label {
        font-size: 9px;
        color: var(--amber);
      }
      .node.fan-node .node-on-label {
        color: var(--cyan);
      }

      /* ---------- Body grid: device list + alerts ---------- */
      .body-grid {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 24px;
      }
      @media (max-width: 820px) {
        .body-grid {
          grid-template-columns: 1fr;
        }
      }

      .device-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .device-card .left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .device-card .name {
        font-size: 13.5px;
        font-weight: 500;
      }
      .device-card .meta {
        font-size: 11px;
        color: var(--text-muted);
        font-family: "IBM Plex Mono", monospace;
        margin-top: 2px;
      }
      .status-pill {
        font-family: "IBM Plex Mono", monospace;
        font-size: 10.5px;
        letter-spacing: 0.06em;
        padding: 4px 9px;
        border-radius: 20px;
        border: 1px solid var(--border);
        color: var(--text-muted);
      }
      .status-pill.on-light {
        color: var(--amber);
        border-color: var(--amber-dim);
        background: var(--amber-dim);
      }
      .status-pill.on-fan {
        color: var(--cyan);
        border-color: var(--cyan-dim);
        background: var(--cyan-dim);
      }

      .room-block {
        margin-bottom: 22px;
      }
      .room-block h3 {
        font-size: 13px;
        font-weight: 600;
        margin: 0 0 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* ---------- Alerts ---------- */
      .alerts-panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 16px;
        height: fit-content;
      }
      .alerts-panel h3 {
        margin: 0 0 14px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
      }
      .alert-item {
        display: flex;
        gap: 10px;
        padding: 10px 0;
        border-top: 1px solid var(--border);
      }
      .alert-item:first-of-type {
        border-top: none;
        padding-top: 0;
      }
      .alert-bar {
        width: 3px;
        border-radius: 2px;
        background: var(--alert);
        flex-shrink: 0;
      }
      .alert-text {
        font-size: 12.5px;
        line-height: 1.5;
      }
      .alert-time {
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 3px;
      }
      .no-alerts {
        color: var(--text-muted);
        font-size: 12.5px;
      }

      footer {
        margin-top: 36px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        font-family: "IBM Plex Mono", monospace;
        font-size: 10.5px;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
      }
      .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--cyan);
        margin-right: 6px;
        animation: pulse-glow2 2s ease-in-out infinite;
      }
      @keyframes pulse-glow2 {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <div class="brand-eyebrow">Small Office &middot; Live Monitoring</div>
          <h1>Office Power Monitor</h1>
          <div class="subline">
            Drawing Room &nbsp;&middot;&nbsp; Work Room 1 &nbsp;&middot;&nbsp;
            Work Room 2
          </div>
        </div>
        <div class="readouts">
          <div class="readout">
            <div class="label">Current Total Power</div>
            <div class="value power">
              <span id="total-power" class="mono">0</span
              ><span class="unit">W</span>
            </div>
          </div>
          <div class="readout">
            <div class="label">Today's Est. Usage</div>
            <div class="value">
              <span id="today-usage" class="mono">0.0</span
              ><span class="unit">kWh</span>
            </div>
          </div>
        </div>
      </header>

      <div class="floorplan-section">
        <div class="section-label">Top-view office map &middot; live</div>
        <div class="floorplan" id="floorplan"></div>
      </div>

      <div class="body-grid">
        <div id="device-lists"></div>

        <div class="alerts-panel">
          <h3>Alerts</h3>
          <div id="alerts"></div>
        </div>
      </div>

      <footer>
        <div><span class="dot"></span>Simulator tick every 5s</div>
        <div id="clock" class="mono"></div>
      </footer>
    </div>

    <script>
      /* ============================================================
   MOCK DATA — matches the Device.to_dict() contract from
   Person A's models:
   { id, room, name, type, status, power_draw, last_changed, continuous_on_since }
   Swap loadMockState() for a fetch('/api/status') + Socket.IO
   listener once the backend is live. Nothing else needs to change.
   ============================================================ */

      const ROOMS = ["Drawing Room", "Work Room 1", "Work Room 2"];
      const POWER = { light: 12, fan: 55 }; // watts, roughly realistic

      let devices = [];
      let idCounter = 1;
      ROOMS.forEach((room) => {
        for (let i = 1; i <= 3; i++) {
          devices.push(makeDevice(idCounter++, room, `Light ${i}`, "light"));
        }
        for (let i = 1; i <= 2; i++) {
          devices.push(makeDevice(idCounter++, room, `Fan ${i}`, "fan"));
        }
      });

      function makeDevice(id, room, name, type) {
        const on = Math.random() > 0.5;
        return {
          id,
          room,
          name,
          type,
          status: on,
          power_draw: on ? POWER[type] : 0,
          last_changed: new Date().toISOString(),
          continuous_on_since: on
            ? new Date(Date.now() - Math.random() * 7200000).toISOString()
            : null,
        };
      }

      let todayKwh = 4.2; // seed value for demo

      function toggleRandomDevice() {
        const d = devices[Math.floor(Math.random() * devices.length)];
        d.status = !d.status;
        d.power_draw = d.status ? POWER[d.type] : 0;
        d.last_changed = new Date().toISOString();
        d.continuous_on_since = d.status ? new Date().toISOString() : null;
      }

      function totalPower() {
        return devices.reduce((sum, d) => sum + d.power_draw, 0);
      }

      function renderFloorplan() {
        const el = document.getElementById("floorplan");
        el.innerHTML = ROOMS.map((room) => {
          const roomDevices = devices.filter((d) => d.room === room);
          const roomPower = roomDevices.reduce((s, d) => s + d.power_draw, 0);
          const nodes = roomDevices
            .map((d) => {
              if (d.type === "light") {
                return `<div class="node">
          <div class="bulb ${d.status ? "on" : ""}"></div>
          <div class="${d.status ? "node-on-label" : "node-off-label"}">${d.name}</div>
        </div>`;
              }
              return `<div class="node fan-node">
        <div class="fan ${d.status ? "on" : ""}">
          <div class="blade-set">
            <div class="blade"></div><div class="blade"></div>
            <div class="blade"></div><div class="blade"></div>
            <div class="hub"></div>
          </div>
        </div>
        <div class="${d.status ? "node-on-label" : "node-off-label"}">${d.name}</div>
      </div>`;
            })
            .join("");

          return `<div class="room">
      <div class="room-name">${room}</div>
      <div class="room-power">Room load: <span class="num">${roomPower}</span> W</div>
      <div class="nodes">${nodes}</div>
    </div>`;
        }).join("");
      }

      function renderDeviceLists() {
        const el = document.getElementById("device-lists");
        el.innerHTML = ROOMS.map((room) => {
          const roomDevices = devices.filter((d) => d.room === room);
          const cards = roomDevices
            .map((d) => {
              const pillClass = d.status
                ? d.type === "light"
                  ? "on-light"
                  : "on-fan"
                : "";
              return `<div class="device-card">
        <div class="left">
          <div>
            <div class="name">${d.name}</div>
            <div class="meta">ID ${String(d.id).padStart(3, "0")} &middot; ${d.power_draw}W</div>
          </div>
        </div>
        <div class="status-pill ${pillClass}">${d.status ? "ON" : "OFF"}</div>
      </div>`;
            })
            .join("");
          return `<div class="room-block">
      <h3>${room}</h3>
      ${cards}
    </div>`;
        }).join("");
      }

      function renderAlerts() {
        const el = document.getElementById("alerts");
        const hour = new Date().getHours();
        const alerts = [];

        if (hour >= 17) {
          ROOMS.forEach((room) => {
            const stillOn = devices.filter((d) => d.room === room && d.status);
            if (stillOn.length) {
              alerts.push(
                `${room} still has ${stillOn.length} device${stillOn.length > 1 ? "s" : ""} ON after 5 PM. Did someone forget to turn them off?`,
              );
            }
          });
        }

        devices
          .filter((d) => d.status && d.continuous_on_since)
          .forEach((d) => {
            const hrsOn =
              (Date.now() - new Date(d.continuous_on_since)) / 3600000;
            if (hrsOn > 2) {
              alerts.push(
                `${d.name} in ${d.room} has been ON continuously for over 2 hours.`,
              );
            }
          });

        el.innerHTML = alerts.length
          ? alerts
              .slice(0, 6)
              .map(
                (msg) => `<div class="alert-item">
        <div class="alert-bar"></div>
        <div>
          <div class="alert-text">${msg}</div>
          <div class="alert-time">${new Date().toLocaleTimeString()}</div>
        </div>
      </div>`,
              )
              .join("")
          : `<div class="no-alerts">No active alerts. Everything's behaving.</div>`;
      }

      function renderReadouts() {
        document.getElementById("total-power").textContent = totalPower();
        document.getElementById("today-usage").textContent =
          todayKwh.toFixed(1);
      }

      function renderClock() {
        document.getElementById("clock").textContent =
          new Date().toLocaleString();
      }

      function renderAll() {
        renderFloorplan();
        renderDeviceLists();
        renderAlerts();
        renderReadouts();
      }

      renderAll();
      renderClock();
      setInterval(renderClock, 1000);

      // Simulate the backend's 5-second tick (Person A's real simulator will
      // replace this — the SocketIO client will call renderAll() on 'device_update')
      setInterval(() => {
        toggleRandomDevice();
        todayKwh += (totalPower() / 1000) * (5 / 3600); // rough running estimate
        renderAll();
      }, 5000);
    </script>
  </body>
</html>
